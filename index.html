<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Pool 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12071e;--bg2:#1e0f30;--bg3:#28184a;
  --purple:#c084e8;--purple-dark:#7b3fa0;
  --lilac:#d4a8f5;--pink:#f06090;--pink-dim:#f0609022;
  --green:#44e87a;--green-dim:#44e87a22;
  --cyan:#22d4e8;--orange:#ff8840;--gold:#f0b429;
  --text:#f5eeff;--text-muted:#b090d0;--text-dim:#5a3a7a;
  --border:#ffffff12;--border-bright:#ffffff25;
  --fav-bg:#0a2a1a;--fav-border:#44e87a55;--fav-text:#44e87a;
  --draw-bg:#2a1a3a;--draw-border:#c084e855;--draw-text:#c084e8;
  --upset-bg:#2a0a1a;--upset-border:#f0609055;--upset-text:#f06090;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;min-height:100vh;}
.stripe{height:4px;background:linear-gradient(90deg,var(--purple-dark),var(--purple),var(--pink),var(--orange),var(--green),var(--cyan));}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;gap:8px;}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:0.04em;color:var(--lilac);white-space:nowrap;}
.logo em{color:var(--pink);font-style:normal;}
.nav-tabs{display:flex;gap:4px;flex-shrink:0;}
.nav-tab{background:transparent;border:none;padding:6px 12px;border-radius:6px;color:var(--text-muted);font-family:'Barlow',sans-serif;font-size:13px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.nav-tab:hover{background:var(--bg3);color:var(--text);}
.nav-tab.active{background:var(--purple-dark);color:#fff;}
.header-player{font-size:12px;color:var(--text-muted);white-space:nowrap;flex-shrink:0;}
.header-player strong{color:var(--lilac);}
main{max-width:960px;margin:0 auto;padding:2rem 1.25rem 4rem;}
.screen{display:none;}.screen.active{display:block;}

.btn-primary{width:100%;margin-top:14px;background:linear-gradient(90deg,var(--purple-dark),var(--pink));color:#fff;border:none;border-radius:8px;padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:0.05em;cursor:pointer;transition:opacity 0.15s;}
.btn-primary:hover{opacity:0.85;}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;}
.btn-ghost{background:transparent;border:1px solid var(--border-bright);border-radius:8px;padding:9px 18px;color:var(--text-muted);font-family:'Barlow',sans-serif;font-size:14px;cursor:pointer;transition:border-color 0.15s,color 0.15s;}
.btn-ghost:hover{border-color:var(--purple);color:var(--lilac);}
.btn-small{background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text-muted);font-size:12px;cursor:pointer;}
.btn-small:hover{border-color:var(--purple);color:var(--lilac);}
.btn-danger{background:var(--upset-bg);border:1px solid var(--upset-border);color:var(--upset-text);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;}

/* LEADERBOARD */
.lb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px;}
.lb-top h2{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;}
.pot-strip{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem;}
.pot-chip{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--text-muted);}
.pot-chip strong{color:var(--text);}
.lb-table{width:100%;border-collapse:collapse;font-size:14px;}
.lb-table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border);}
.lb-table td{padding:12px 14px;border-bottom:1px solid var(--border);}
.lb-table tr:last-child td{border-bottom:none;}
.lb-table tbody tr{cursor:pointer;}
.lb-table tbody tr:hover td{background:var(--bg2);}
.lb-table tbody tr.highlighted td{background:var(--bg3);border-left:3px solid var(--purple);}
.rank-num{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--text-dim);}
.rank-num.top1{color:var(--gold);}.rank-num.top2{color:#9090b8;}.rank-num.top3{color:#d08040;}
.pts-badge{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--purple);}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.refresh-info{font-size:12px;color:var(--text-dim);margin-bottom:1rem;}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.status-ok{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--green-dim);color:var(--green);border:1px solid var(--fav-border);}
.status-pending{font-size:11px;padding:3px 8px;border-radius:20px;background:transparent;color:var(--text-dim);border:1px solid var(--border);}

/* PLAYER DETAIL */
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px;}
.detail-header h2{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;}
.detail-header h2 span{color:var(--lilac);}
.detail-pts{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--purple);margin-bottom:1rem;}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;}
.group-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;}
.group-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.1em;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px;}
.pick-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;gap:6px;}
.pick-row:last-child{border-bottom:none;}
.match-teams-detail{color:var(--text-muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;}
.match-pick{color:var(--text);font-weight:500;font-size:11px;white-space:nowrap;}
.pick-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;white-space:nowrap;}
.tag-correct{background:#1a1a2a;color:#a0a0f0;border:1px solid #a0a0f055;}
.tag-wrong{background:#1a1a1a;color:#555;border:1px solid #33333355;}
.tag-pending{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
.pts-earned{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--green);min-width:26px;text-align:right;}
.pts-zero{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--text-dim);min-width:26px;text-align:right;}
.pts-dash{font-size:12px;color:var(--text-dim);min-width:26px;text-align:right;}
.matchday-label{font-size:11px;color:var(--purple);font-weight:600;padding:4px 0 2px;margin-top:4px;}

/* SCHEDULE */
.day-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--purple);margin:1.5rem 0 0.5rem;padding:4px 0;border-bottom:1px solid var(--border);}
.match-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:0.75rem;}
.match-meta{font-size:12px;color:var(--text);margin-bottom:8px;font-weight:500;}
.match-teams-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:0.75rem;}
.team-home{display:flex;align-items:center;gap:6px;}
.team-away{display:flex;align-items:center;gap:6px;justify-content:flex-end;}
.flag{font-size:20px;}
.team-name-s{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--text);}
.score-s{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--gold);text-align:center;min-width:50px;}
.score-s.pending{color:var(--text-dim);font-size:14px;}
.picks-grid{display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;border-top:1px solid var(--border);padding-top:0.75rem;}
.divider-v{background:var(--border);width:1px;margin:0 8px;}
.picks-col{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:0 4px;}
.pts-col-label{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;min-width:26px;flex-shrink:0;}
.pts-green{color:var(--green);}
.pts-dim{color:var(--text-dim);}
.pts-zero{color:#444;}
.sm-avatar{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;color:#fff;position:relative;cursor:default;flex-shrink:0;}
.sm-avatar:hover .tooltip{display:block;}
.tooltip{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border-bright);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--text);white-space:nowrap;z-index:10;}
.empty-dash{color:var(--text-dim);font-size:13px;}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#00000099;display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;}
.modal{background:var(--bg2);border:1px solid var(--border-bright);border-radius:14px;padding:1.75rem;width:100%;max-width:380px;}
.modal h3{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;margin-bottom:0.5rem;color:var(--lilac);}
.modal p{font-size:13px;color:var(--text-muted);margin-bottom:1rem;}
.player-select-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;}
.player-select-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color 0.15s;}
.player-select-btn:hover{border-color:var(--purple);}
.player-select-btn span{font-size:14px;font-weight:500;color:var(--text);}
.modal-close{margin-top:12px;width:100%;background:transparent;border:1px solid var(--border);border-radius:8px;padding:9px;color:var(--text-muted);font-family:'Barlow',sans-serif;font-size:14px;cursor:pointer;}
.modal-close:hover{border-color:var(--text-muted);}

.admin-wrap{max-width:420px;margin:2rem auto 0;}
.err-msg{font-size:12px;color:var(--pink);margin-top:5px;min-height:16px;}
@media(max-width:500px){main{padding:1.25rem 1rem 3rem;}.groups-grid{grid-template-columns:1fr;}.team-name-s{font-size:13px;}.flag{font-size:16px;}}
</style>
</head>

<div class="stripe"></div>
<header>
  <div class="logo">WORLD<em>CUP</em> POOL</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showScreen('lb');setActiveTab(this)">Leaderboard</button>
    <button class="nav-tab" onclick="showScreen('schedule');setActiveTab(this);renderSchedule()">Schedule</button>
  </div>
  <div class="header-player" id="header-player">
    <button class="btn-ghost" style="font-size:12px;padding:5px 12px;" onclick="openPlayerSelect()">Who am I?</button>
  </div>
</header>

<main>
  <!-- LEADERBOARD -->
  <div id="screen-lb" class="screen active">
    <div class="lb-top">
      <h2>Leaderboard</h2>
      <button class="btn-ghost" style="font-size:12px;padding:6px 14px;" onclick="toggleAdmin()">Admin</button>
    </div>
    <div class="pot-strip" id="pot-strip"></div>
    <div id="refresh-info" class="refresh-info"></div>
    <div id="lb-content"></div>
    <p style="font-size:12px;color:var(--text-dim);margin-top:1rem;">Click any player to see their picks</p>
    <div class="admin-wrap">
      <div id="admin-area" style="display:none;margin-top:1rem;">
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.75rem;max-width:420px;">
          <label style="display:block;font-size:12px;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;">Admin password</label>
          <input type="password" id="admin-pw" placeholder="Enter admin password" style="width:100%;background:var(--bg3);border:1px solid var(--border-bright);border-radius:8px;padding:10px 14px;color:var(--text);font-size:16px;font-family:'Barlow',sans-serif;outline:none;">
          <div class="err-msg" id="admin-err"></div>
          <button class="btn-primary" onclick="checkAdmin()">Unlock</button>
        </div>
        <div id="admin-players" style="margin-top:1rem;max-width:420px;"></div>
      </div>
    </div>
  </div>

  <!-- SCHEDULE -->
  <div id="screen-schedule" class="screen">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px;">
      <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;">Match Schedule</h2>
      <div id="schedule-refresh" class="refresh-info"></div>
    </div>
    <div id="schedule-content"></div>
  </div>

  <!-- PLAYER DETAIL -->
  <div id="screen-detail" class="screen">
    <div class="detail-header">
      <h2><span id="detail-name"></span></h2>
      <button class="btn-ghost" onclick="showScreen('lb');setActiveTab(document.querySelectorAll('.nav-tab')[0])">Back</button>
    </div>
    <div id="detail-pts" class="detail-pts"></div>
    <div class="groups-grid" id="detail-grid"></div>
  </div>
</main>

<!-- WHO AM I MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:flex;" onclick="closeModalIfOutside(event)">
  <div class="modal">
    <h3>Welcome! Who are you?</h3>
    <p>Select your name to highlight your position on the leaderboard.</p>
    <div class="player-select-list" id="player-select-list">
      <div style="text-align:center;color:var(--text-muted);font-size:13px;padding:1rem;">Loading players...</div>
    </div>
    <button class="modal-close" onclick="closeModal()">Just browsing</button>
  </div>
</div>

function isFav(team,teams){return teams.indexOf(team)<2;}
function initials(n){return n.trim().split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2)||'??';}
function hashPw(pw){var h=0;for(var i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h|=0;}return 'h'+Math.abs(h).toString(36);}
function avatarColor(n){var h=0;for(var i=0;i<n.length;i++){h=((h<<5)-h)+n.charCodeAt(i);h|=0;}return AVATARCOLORS[Math.abs(h)%AVATARCOLORS.length];}
function normaliseTeam(n){if(!n)return '';return TEAM_ALIASES[n]||n;}
function getResultOutcome(home,away,hs,as){if(hs>as)return normaliseTeam(home);if(as>hs)return normaliseTeam(away);return 'draw';}
function hasAnyResults(){return Object.keys(matchResults).length>0;}

function getGroupMatchIndex(groupName,home,away){
  var g=null;for(var i=0;i<GROUPS.length;i++){if(GROUPS[i].name===groupName){g=GROUPS[i];break;}}
  if(!g)return -1;
  // find match index - matches stored as group-mi keys, find by teams
  for(var mi=0;mi<(g.teams.length*(g.teams.length-1)/2);mi++){
    // reconstruct match order: all combinations
  }
  // Use ALL_MATCHES to find index within group
  var gMatches=ALL_MATCHES.filter(function(m){return m.group===groupName;});
  for(var j=0;j<gMatches.length;j++){
    if((gMatches[j].home===home&&gMatches[j].away===away)||(gMatches[j].home===away&&gMatches[j].away===home)) return j;
  }
  return -1;
}

function getPickForMatch(picks,groupName,home,away){
  // Try by match index in group
  var gMatches=ALL_MATCHES.filter(function(m){return m.group===groupName;});
  for(var j=0;j<gMatches.length;j++){
    var m=gMatches[j];
    if(m.home===home&&m.away===away){
      var key=groupName+'-'+j;
      if(picks[key])return picks[key];
    }
  }
  // fallback: search all keys
  for(var key in picks){
    var parts=key.split('-');var mi=parseInt(parts[parts.length-1]);var gn=parts.slice(0,-1).join('-');
    if(gn===groupName){
      var gm=gMatches[mi];
      if(gm&&((gm.home===home&&gm.away===away)||(gm.home===away&&gm.away===home))) return picks[key];
    }
  }
  return null;
}

function getPtsForPick(groupName,home,away,pick){
  var g=null;for(var i=0;i<GROUPS.length;i++){if(GROUPS[i].name===groupName){g=GROUPS[i];break;}}
  if(!g)return PTS_UPSET;
  if(pick==='draw')return PTS_DRAW;
  if((pick===home&&isFav(home,g.teams))||(pick===away&&isFav(away,g.teams)))return PTS_FAV;
  return PTS_UPSET;
}

function getMatchResult(home,away){
  return matchResults[home+'|'+away]||matchResults[away+'|'+home]||null;
}

function calcScore(picks){
  var score=0;
  var gMatches={};
  GROUPS.forEach(function(g){
    gMatches[g.name]=ALL_MATCHES.filter(function(m){return m.group===g.name;});
  });
  for(var key in picks){
    var parts=key.split('-');var mi=parseInt(parts[parts.length-1]);var gn=parts.slice(0,-1).join('-');
    var pick=picks[key];
    var gm=gMatches[gn]?gMatches[gn][mi]:null;
    if(!gm)continue;
    var result=getMatchResult(gm.home,gm.away);
    if(result&&result===pick) score+=getPtsForPick(gn,gm.home,gm.away,pick);
  }
  return score;
}

function calcMaxPossible(picks){
  var max=0;
  var gMatches={};
  GROUPS.forEach(function(g){gMatches[g.name]=ALL_MATCHES.filter(function(m){return m.group===g.name;});});
  for(var key in picks){
    var parts=key.split('-');var mi=parseInt(parts[parts.length-1]);var gn=parts.slice(0,-1).join('-');
    var gm=gMatches[gn]?gMatches[gn][mi]:null;
    if(!gm)continue;
    max+=getPtsForPick(gn,gm.home,gm.away,picks[key]);
  }
  return max;
}

function calcBestPossible(picks){
  var earned=calcScore(picks);var still=0;
  var gMatches={};
  GROUPS.forEach(function(g){gMatches[g.name]=ALL_MATCHES.filter(function(m){return m.group===g.name;});});
  for(var key in picks){
    var parts=key.split('-');var mi=parseInt(parts[parts.length-1]);var gn=parts.slice(0,-1).join('-');
    var pick=picks[key];
    var gm=gMatches[gn]?gMatches[gn][mi]:null;
    if(!gm)continue;
    var result=getMatchResult(gm.home,gm.away);
    if(!result) still+=getPtsForPick(gn,gm.home,gm.away,pick);
  }
  return {best:earned+still,still:still};
}

async function fetchResults(){
  try{
    var resp=await fetch('https://worldcup26.ir/get/games');
    if(!resp.ok)return;
    var data=await resp.json();
    var nr={};
    var games=Array.isArray(data)?data:(data.games||data.data||[]);
    games.forEach(function(m){
      var finished=m.finished==='TRUE'||m.finished===true||m.time_elapsed==='finished';
      if(finished){
        var home=normaliseTeam(m.home_team_name_en||m.home_team||'');
        var away=normaliseTeam(m.away_team_name_en||m.away_team||'');
        var hs=parseInt(m.home_score||0);
        var as=parseInt(m.away_score||0);
        if(home&&away){
          nr[home+'|'+away]=getResultOutcome(home,away,hs,as);
          nr[away+'|'+home]=getResultOutcome(home,away,hs,as);
        }
      }
    });
    matchResults=nr;lastRefresh=new Date();
    console.log('Results loaded:',Object.keys(nr).length,'finished matches');
  }catch(e){console.log('Results fetch error:',e);}
}

        '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:3px;">'+

        '<span style="font-size:11px;color:var(--text-dim);">to play <strong style="color:var(--text-muted);">'+bp.still+'</strong></span>'+

        '<span style="font-size:11px;color:var(--text-dim);margin-left:2px;">pts</span>'+
        '<div style="font-size:11px;color:var(--text-dim);margin-top:3px;">'+done+' predicted</div></td>';
    }

function showPlayerDetail(name){
  var player=null;
  for(var i=0;i<allPlayers.length;i++){if(allPlayers[i].name===name){player=allPlayers[i];break;}}
  if(!player)return;
  var picks=player.picks||{};
  var score=calcScore(picks);
  var showPts=hasAnyResults();
  document.getElementById('detail-name').textContent=name+"'s picks";
  document.getElementById('detail-pts').textContent=showPts?score+' points total':'Tournament in progress';

  var gMatches={};
  GROUPS.forEach(function(g){gMatches[g.name]=ALL_MATCHES.filter(function(m){return m.group===g.name;});});

  var html='';
  for(var gi=0;gi<GROUPS.length;gi++){
    var g=GROUPS[gi];var gms=gMatches[g.name];
    html+='<div class="group-card"><div class="group-label">'+g.name+'</div>';
    var md=0;
    for(var mi=0;mi<gms.length;mi++){
      var newMd=mi<8?(mi<4?(mi<2?1:2):3):Math.floor(mi/2)+1;
      if(mi===0||mi===2||mi===4){newMd=mi===0?1:mi===2?2:3;}
      var realMd=mi<2?1:mi<4?2:3;
      if(realMd!==md){md=realMd;html+='<div class="matchday-label">Matchday '+md+'</div>';}
      var m=gms[mi];
      var key=g.name+'-'+mi;
      var pick=picks[key]||null;
      var result=getMatchResult(m.home,m.away);
      var outcome=pick?(result?(pick===result?'correct':'wrong'):'pending'):'none';
      var pickLabel='';
      if(pick==='draw')pickLabel='Draw';else if(pick)pickLabel=pick+' win';
      var tagClass='tag-none',tagText='No pick';
      if(pick&&outcome==='correct'){tagClass='tag-correct';tagText='Correct';}
      else if(pick&&outcome==='wrong'){tagClass='tag-wrong';tagText='Wrong';}
      else if(pick&&outcome==='pending'){tagClass='tag-pending';tagText='Pending';}
      var ptsHtml='';
      if(outcome==='correct'){ptsHtml='<span class="pts-earned">+'+getPtsForPick(g.name,m.home,m.away,pick)+'</span>';}
      else if(outcome==='wrong'){ptsHtml='<span class="pts-zero">0</span>';}
      else if(pick){ptsHtml='<span class="pts-dash">—</span>';}
      html+='<div class="pick-row"><span class="match-teams-detail">'+m.home+' vs '+m.away+'</span>';
      if(pick)html+='<span class="match-pick">'+pickLabel+'</span>';
      html+='<span class="pick-tag '+tagClass+'">'+tagText+'</span>'+ptsHtml+'</div>';
    }
    html+='</div>';
  }
  document.getElementById('detail-grid').innerHTML=html;
  showScreen('detail');
}

function renderSchedule(){
  var ri=document.getElementById('schedule-refresh');
  if(hasAnyResults()){
    ri.innerHTML='<span class="live-dot"></span>Last updated: '+(lastRefresh?lastRefresh.toLocaleTimeString():'—');
  }

  var html='';
  var currentDate='';

  for(var mi=0;mi<ALL_MATCHES.length;mi++){
    var m=ALL_MATCHES[mi];
    var result=getMatchResult(m.home,m.away);
    var finished=!!result;

    // Day label
    if(m.date!==currentDate){
      currentDate=m.date;
      var d=new Date(m.date+'T12:00:00');
      var dayStr=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
      html+='<div class="day-label">📅 '+dayStr+'</div>';
    }

    // Convert time to local
    var matchDt=new Date(m.date+'T'+m.time+':00-05:00');
    var localTime=matchDt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

    // Result label
    var resultLabel='';
    if(result==='draw')resultLabel='Draw';
    else if(result)resultLabel=result+' win';

    // Score display
    var homeScore='',awayScore='';
    var resKey=m.home+'|'+m.away;

    html+='<div class="match-card">';
    html+='<div class="match-meta">Match '+(mi+1)+' &middot; '+m.group+' &middot; '+localTime+'</div>';
    html+='<div class="match-teams-row">';
    html+='<div class="team-home"><span class="flag">'+flag(m.home)+'</span><span class="team-name-s">'+m.home+'</span></div>';
    if(finished){
      html+='<div class="score-s">'+resultLabel+'</div>';
    } else {
      html+='<div class="score-s pending">vs</div>';
    }
    html+='<div class="team-away"><span class="team-name-s">'+m.away+'</span><span class="flag">'+flag(m.away)+'</span></div>';
    html+='</div>';

    // Three column picks
    var homeWinPickers=[],drawPickers=[],awayWinPickers=[];
    for(var pi=0;pi<allPlayers.length;pi++){
      var p=allPlayers[pi];
      var pick=(p.picks||{})[m.group+'-'+mi]||null;
      if(pick===m.home)homeWinPickers.push(p);
      else if(pick==='draw')drawPickers.push(p);
      else if(pick===m.away)awayWinPickers.push(p);
    }

    var homePts=getPtsForPick(m.group,m.home,m.away,m.home);
    var drawPts=PTS_DRAW;
    var awayPts=getPtsForPick(m.group,m.home,m.away,m.away);

    function colHtml(pickers,pick,pts){
      var isCorrect=finished&&result===pick;
      var isWrong=finished&&result!==pick;
      var ptsClass=isCorrect?'pts-green':isWrong?'pts-zero':'pts-dim';
      var ptsStr=isCorrect?'+'+pts:isWrong?'0':'+'+pts;
      var h='<div class="picks-col">';
      h+='<span class="pts-col-label '+ptsClass+'">'+ptsStr+'</span>';
      if(pickers.length===0){h+='<span class="empty-dash">—</span>';}
      else{
        pickers.forEach(function(pl){
          h+='<div class="sm-avatar" style="background:'+avatarColor(pl.name)+';">'+initials(pl.name)+'<div class="tooltip">'+pl.name+'</div></div>';
        });
      }
      h+='</div>';
      return h;
    }

    html+='<div class="picks-grid">';
    html+=colHtml(homeWinPickers,m.home,homePts);
    html+='<div class="divider-v"></div>';
    html+=colHtml(drawPickers,'draw',drawPts);
    html+='<div class="divider-v"></div>';
    html+=colHtml(awayWinPickers,m.away,awayPts);
    html+='</div>';
    html+='</div>';
  }

  document.getElementById('schedule-content').innerHTML=html;
}

      '<div class="avatar" style="background:'+avatarColor(p.name)+';">'+initials(p.name)+'</div>'+
      '<span style="flex:1;font-size:14px;">'+p.name+'</span>'+
      '<span class="'+(p.submitted?'status-ok':'status-pending')+'">'+(p.submitted?'Submitted':'In progress')+'</span>'+
      '<button class="btn-small" onclick="resetPassword(\''+p.name.replace(/'/g,"\\'")+'\')">Reset pw</button>'+
      '<button class="btn-danger" onclick="deletePlayer(\''+p.name.replace(/'/g,"\\'")+'\')">Delete</button>'+
      '</div>';
  }
  area.innerHTML=html;
}

async function resetPassword(name){
  var newPw=prompt('Enter new password for '+name+':');
  if(!newPw||newPw.trim().length<3){alert('Password must be at least 3 characters.');return;}
  await db.from('players').update({pw_hash:hashPw(newPw.trim())}).eq('name',name);
  alert('Password reset for '+name+'. New password: '+newPw.trim());
}

async function deletePlayer(name){
  if(!confirm('Delete '+name+'? This cannot be undone.'))return;
  await db.from('players').delete().eq('name',name);
  allPlayers=allPlayers.filter(function(p){return p.name!==name;});
  renderAdminPlayers();renderLeaderboard();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('screen-'+id).classList.add('active');
}
function setActiveTab(el){
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});
  if(el)el.classList.add('active');
}

init();
</script>
</body>
</html>
